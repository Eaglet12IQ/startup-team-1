version: "3.8"

services:
  backend:
    image: pidisplay-backend:latest
    container_name: pidisplay-backend
    ports:
      - "8082:8082"
    volumes:
      - pidisplay-schemas:/app/schemas
      - /opt/pidisplay:/opt/pidisplay
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    image: pidisplay-frontend:latest
    container_name: pidisplay-frontend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  pidisplay-schemas:
