services:
  backend:
    build:
      context: ./constructor-service
      dockerfile: Dockerfile
    container_name: pidisplay-backend
    ports:
      - "8082:8082"
    volumes:
      - ./constructor-service/schemas:/app/schemas
      - ./constructor-service/uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_PORT=8082
    restart: unless-stopped
    networks:
      - kong-net

  pi-image-builder:
    build:
      context: ./pi-image-builder
      dockerfile: Dockerfile
    container_name: pi-image-builder
    ports:
      - "3000:3000"
    volumes:
      - .:/app/source:ro
      - ./pi-image-builder/images:/app/images
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/vite-project/Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - chat-service
      - backend
      - kong
    restart: unless-stopped
    networks:
      - kong-net

  chat-postgres:
    image: postgres:15
    container_name: chat-postgres
    restart: always
    environment:
      POSTGRES_USER: ${CHAT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CHAT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${CHAT_POSTGRES_DB}
    volumes:
      - chat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CHAT_POSTGRES_USER} -d ${CHAT_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kong-net

  chat-service:
    build: ./chat-service
    container_name: chat-service
    restart: always
    depends_on:
      chat-postgres:
        condition: service_healthy
      chat-redis:
        condition: service_started
      ai-agent:
        condition: service_started
    environment:
      POSTGRES_HOST: ${CHAT_POSTGRES_HOST}
      POSTGRES_PORT: ${CHAT_POSTGRES_PORT}
      POSTGRES_USER: ${CHAT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CHAT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${CHAT_POSTGRES_DB}
      REDIS_HOST: chat-redis
      REDIS_PORT: ${CHAT_REDIS_PORT}
      SERVICE_PORT: ${CHAT_SERVICE_PORT}
    ports:
      - "${CHAT_SERVICE_PORT}:${CHAT_SERVICE_PORT}"
    volumes:
      - ./chat-service/alembic:/app/alembic
    networks:
      - kong-net

  chat-redis:
    image: redis:7-alpine
    container_name: chat-redis
    command: redis-server --port ${CHAT_REDIS_PORT} --appendonly yes --save 60 1 --protected-mode no
    ports:
      - "${CHAT_REDIS_PORT}:${CHAT_REDIS_PORT}"
    volumes:
      - chat_redis_data:/data
    networks:
      - kong-net

  ai-agent:
    build: ./ai-agent
    container_name: ai-agent
    environment:
      REDIS_HOST: chat-redis
      REDIS_PORT: ${CHAT_REDIS_PORT}
      LLM_URL: ${LLM_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      MODEL_NAME: ${MODEL_NAME}
      MAIN_SYSTEM_PROMPT: ${MAIN_SYSTEM_PROMPT}
    depends_on:
      - chat-redis
    restart: unless-stopped
    networks:
      - kong-net

  auth-service:
    build: ./auth-service
    container_name: auth-service
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8080"
    volumes:
      - ./logs:/app/logs
    depends_on:
      auth-service-postgres:
        condition: service_healthy
    environment:
      - DB_HOST=${AUTH_SERVICE_POSTGRES_HOST}
      - DB_PORT=${AUTH_SERVICE_POSTGRES_PORT}
      - DB_USER=${AUTH_SERVICE_POSTGRES_USER}
      - DB_PASSWORD=${AUTH_SERVICE_POSTGRES_PASSWORD}
      - DB_NAME=${AUTH_SERVICE_POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TTL=${ACCESS_TTL}
      - REFRESH_TTL=${REFRESH_TTL}
    restart: unless-stopped
    networks:
      - internal-net
      - kong-net

  auth-service-postgres:
    image: postgres:16-alpine
    container_name: auth-service-db
    environment:
      POSTGRES_USER: ${AUTH_SERVICE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_SERVICE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_SERVICE_POSTGRES_DB}
    ports:
      - "${AUTH_SERVICE_POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./auth-service/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_SERVICE_POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - internal-net

  kong-db:
    image: postgres:13-alpine
    container_name: kong-db
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
    volumes:
      - kong_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-net

  kong-migrations:
    image: kong:3.9
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
    command: kong migrations bootstrap
    networks:
      - kong-net
    restart: on-failure

  kong:
    image: kong:3.9
    container_name: kong
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PLUGINS: "bundled,jwt-check"
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      JWT_SECRET: secret
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
    volumes:
      - ./check-plugin:/usr/local/share/lua/5.1/kong/plugins/jwt-check
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - kong-net
    restart: unless-stopped

  kong-setup:
    image: badouralix/curl-jq:latest
    container_name: kong-setup
    depends_on:
      kong:
        condition: service_started
      auth-service:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - kong-net
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e

        echo 'Waiting for Kong Admin API...'
        for i in $$(seq 1 60); do
          if curl -s -o /dev/null -w '%{http_code}' http://kong:8001/status | grep -q 200; then
            echo 'Kong Admin API is ready'
            break
          fi
          echo "Waiting... ($$i/60)"
          sleep 2
        done

        echo 'Creating services and routes...'

        # === AUTH SERVICE ===
        curl -s -X POST http://kong:8001/services \
          -d name=auth-service \
          -d url=http://auth-service:8080

        # Public auth routes (no jwt-check plugin)
        curl -s -X POST http://kong:8001/services/auth-service/routes \
          -d name=auth-public-routes \
          -d 'paths[]=/api/v1/register' \
          -d 'paths[]=/api/v1/auth' \
          -d strip_path=false

        # Protected auth route (with jwt-check)
        curl -s -X POST http://kong:8001/services/auth-service/routes \
          -d name=auth-protected-routes \
          -d 'paths[]=/api/v1/refresh' \
          -d strip_path=false

        # jwt-check plugin on protected auth routes
        curl -s -X POST http://kong:8001/routes/auth-protected-routes/plugins \
          -d name=jwt-check

        # === CONSTRUCTOR SERVICE (backend) ===
        curl -s -X POST http://kong:8001/services \
          -d name=constructor-service \
          -d url=http://backend:8082

        curl -s -X POST http://kong:8001/services/constructor-service/routes \
          -d name=constructor-schema-routes \
          -d 'paths[]=/api/my' \
          -d 'paths[]=/api/save' \
          -d strip_path=false

        curl -s -X POST http://kong:8001/services/constructor-service/routes \
          -d name=constructor-dynamic-routes \
          -d 'paths[]=~/api/\d%2B$$' \
          -d 'paths[]=~/api/\d%2B/history$$' \
          -d 'paths[]=~/api/\d%2B/version/\w%2B$$' \
          -d 'paths[]=~/api/upload/\d%2B$$' \
          -d strip_path=false

        # Public route for serving uploaded images (no auth — <img> tags)
        curl -s -X POST http://kong:8001/services/constructor-service/routes \
          -d name=constructor-uploads-routes \
          -d 'paths[]=~/api/uploads/\d%2B/[^/]%2B$$' \
          -d strip_path=false

        # Apply jwt-check plugin to constructor routes
        for route in constructor-schema-routes constructor-dynamic-routes; do
          curl -s -X POST http://kong:8001/routes/$$route/plugins \
            -d name=jwt-check
        done

        echo 'Kong setup complete'

volumes:
  postgres_data:
    driver: local
  kong_postgres_data:
    driver: local
  chat_postgres_data:
  chat_redis_data:

networks:
  kong-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true
