version: "3.8"

services:
  auth-service:
    build: ./auth-service
    container_name: auth-service
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8080"
    volumes:
      - ./logs:/app/logs
    depends_on:
      auth-service-postgres:
        condition: service_healthy
    environment:
      - DB_HOST=${AUTH_SERVICE_POSTGRES_HOST}
      - DB_PORT=${AUTH_SERVICE_POSTGRES_PORT}
      - DB_USER=${AUTH_SERVICE_POSTGRES_USER}
      - DB_PASSWORD=${AUTH_SERVICE_POSTGRES_PASSWORD}
      - DB_NAME=${AUTH_SERVICE_POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TTL=${ACCESS_TTL}
      - REFRESH_TTL=${REFRESH_TTL}
    restart: unless-stopped
    networks:
      - internal-net 
      - kong-net   

  auth-service-postgres:
    image: postgres:16-alpine
    container_name: auth-service-db
    environment:
      POSTGRES_USER: ${AUTH_SERVICE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_SERVICE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_SERVICE_POSTGRES_DB}
    ports:
      - "${AUTH_SERVICE_POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./auth-service/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_SERVICE_POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - internal-net

  kong-db:
    image: postgres:13-alpine
    container_name: kong-db 
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
    volumes:
      - kong_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-net

  kong-migrations:
    image: kong:3.9
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong
    command: kong migrations bootstrap
    networks:
      - kong-net
    restart: on-failure

  kong:
    image: kong:3.9
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PLUGINS: "bundled,jwt-check"
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      JWT_SECRET: secret
    ports:
      - "8000:8000"   
      - "8001:8001"   
      - "8443:8443"   
    volumes:
      - ./check-plugin:/usr/local/share/lua/5.1/kong/plugins/jwt-check
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - kong-net
    restart: unless-stopped

  kong-setup:
    image: badouralix/curl-jq:latest
    container_name: kong-setup
    depends_on:
      kong:
        condition: service_started
      auth-service:
        condition: service_started
    networks:
      - kong-net
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        echo 'Waiting for Kong Admin API...'
        sleep 30
        echo 'Kong is ready, creating services and routes...'

        # Создаём сервис
        curl -i -X POST http://kong:8001/services \
          -d name=auth-service \
          -d url=http://auth-service:8080

        # Создаём публичные маршруты
        curl -i -X POST http://kong:8001/services/auth-service/routes \
          -d name=auth-public-routes \
          -d 'paths[]=/api/v1/register' \
          -d 'paths[]=/api/v1/auth' \
          -d strip_path=false

        # Создаём защищённые маршруты
        curl -i -X POST http://kong:8001/services/auth-service/routes \
          -d name=auth-protected-routes \
          -d 'paths[]=/api/v1/refresh' \
          -d strip_path=false

        # Добавляем JWT плагин к публичным маршрутам (если нужно)
        curl -i -X POST http://kong:8001/routes/auth-public-routes/plugins \
          -d name=jwt \
          -d "config.secret=${JWT_SECRET}" \
          -d 'config.algorithms[]=HS256'

        # Добавляем JWT плагин к защищённым маршрутам
        curl -i -X POST http://kong:8001/routes/auth-protected-routes/plugins \
          -d name=jwt \
          -d "config.secret=${JWT_SECRET}" \
          -d 'config.algorithms[]=HS256'

        # Добавляем свой Lua handler (jwt-check)
        curl -i -X POST http://kong:8001/routes/auth-protected-routes/plugins \
          -d name=jwt-check

        echo '✅ Kong setup complete'

volumes:
  postgres_data:
    driver: local
  kong_postgres_data:
    driver: local

networks:
  kong-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true