<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Chat с LLM + Tools (потоковый вывод, исправлено)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f8f9fa; }
    #messages {
      border: 1px solid #ddd;
      height: 600px;
      overflow-y: auto;
      padding: 15px;
      margin-bottom: 15px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .message { margin: 12px 0; padding: 10px 14px; border-radius: 10px; max-width: 85%; }
    .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 2px; }
    .assistant { background: #e9ecef; align-self: flex-start; border-bottom-left-radius: 2px; }
    .reasoning {
      background: #f8f1e3;
      font-size: 0.92em;
      color: #856404;
      border-left: 4px solid #ffc107;
      padding-left: 12px;
      font-style: italic;
    }
    .tool-call {
      background: #f0f0f0;
      border-left: 4px solid #6c757d;
      font-family: monospace;
      font-size: 0.9em;
    }
    .tool-result {
      background: #d4edda;
      border-left: 4px solid #28a745;
      font-family: monospace;
      font-size: 0.9em;
    }
    .system { background: #fff3cd; color: #856404; font-style: italic; }
    input { width: 75%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
    button {
      padding: 12px 16px;
      margin: 5px 3px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .send-btn { background: #007bff; color: white; }
    .danger { background: #dc3545; color: white; }
    .message-container { display: flex; flex-direction: column; }
    .tool-result pre {
      margin: 5px 0;
      white-space: pre-wrap;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <h2>🧪 Тест чата с LLM + Инструментами (Redis Streams)</h2>
  <p>
    <strong>Пользователь ID:</strong>
    <input type="number" id="userId" value="1" style="width: 100px;">
  </p>
  <div id="messages" class="message-container"></div>
  <input type="text" id="inputMessage" placeholder="Напишите сообщение..." autocomplete="off">
  <button class="send-btn" onclick="sendMessage()">Отправить</button>
  <button onclick="connect()">Подключиться</button>
  <button onclick="disconnect()">Отключиться</button>
  <button onclick="clearHistory()" class="danger">Очистить историю</button>

  <script>
    let ws = null;
    let userId = 1;

    // Для потокового вывода основного ответа
    const activeAssistantMessages = new Map(); // run_id → { div, textSpan }
    // Для потокового вывода reasoning (мыслей)
    const activeReasoningMessages = new Map(); // run_id → { div, textSpan }

    // Fallback для сообщений без run_id
    let fallbackAssistantDiv = null;
    let fallbackReasoningDiv = null;

    // Экранирование HTML
    function escapeHtml(text) {
      if (text === null || text === undefined) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addMessage(type, content, extra = {}) {
      const messagesDiv = document.getElementById('messages');
      const runId = extra.run_id;

      if (type === 'user') {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message user';
        msgDiv.innerHTML = `<strong>Вы:</strong> ${escapeHtml(content)}`;
        messagesDiv.appendChild(msgDiv);
      }
      else if (type === 'assistant' || type === 'content') {
        if (runId) {
          let entry = activeAssistantMessages.get(runId);
          if (!entry) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';
            msgDiv.innerHTML = `<strong>Ассистент:</strong> `;
            const textSpan = document.createElement('span');
            textSpan.className = 'assistant-text';
            textSpan.textContent = content;
            msgDiv.appendChild(textSpan);
            messagesDiv.appendChild(msgDiv);
            entry = { div: msgDiv, textSpan: textSpan };
            activeAssistantMessages.set(runId, entry);
          } else {
            entry.textSpan.textContent += content;
          }
        } else {
          if (!fallbackAssistantDiv) {
            fallbackAssistantDiv = document.createElement('div');
            fallbackAssistantDiv.className = 'message assistant';
            fallbackAssistantDiv.innerHTML = `<strong>Ассистент:</strong> <span class="assistant-text">${escapeHtml(content)}</span>`;
            messagesDiv.appendChild(fallbackAssistantDiv);
          } else {
            const textSpan = fallbackAssistantDiv.querySelector('.assistant-text');
            if (textSpan) {
              textSpan.textContent += content;
            } else {
              fallbackAssistantDiv.innerHTML += escapeHtml(content);
            }
          }
        }
      }
      else if (type === 'reasoning') {
        if (runId) {
          let entry = activeReasoningMessages.get(runId);
          if (!entry) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message reasoning';
            msgDiv.innerHTML = `<strong>🧠 Мысли:</strong><br>`;
            const textSpan = document.createElement('span');
            textSpan.className = 'reasoning-text';
            textSpan.textContent = content;
            msgDiv.appendChild(textSpan);
            messagesDiv.appendChild(msgDiv);
            entry = { div: msgDiv, textSpan: textSpan };
            activeReasoningMessages.set(runId, entry);
          } else {
            entry.textSpan.textContent += content;
          }
        } else {
          if (!fallbackReasoningDiv) {
            fallbackReasoningDiv = document.createElement('div');
            fallbackReasoningDiv.className = 'message reasoning';
            fallbackReasoningDiv.innerHTML = `<strong>🧠 Мысли:</strong><br><span class="reasoning-text">${escapeHtml(content)}</span>`;
            messagesDiv.appendChild(fallbackReasoningDiv);
          } else {
            const textSpan = fallbackReasoningDiv.querySelector('.reasoning-text');
            if (textSpan) {
              textSpan.textContent += content;
            } else {
              fallbackReasoningDiv.innerHTML += escapeHtml(content);
            }
          }
        }
      }
      else if (type === 'tool_call_start') {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message tool-call';
        const toolName = extra.tool_name || content;
        const toolArgs = extra.tool_args ? JSON.stringify(extra.tool_args, null, 2) : '—';
        msgDiv.innerHTML = `<strong>🔧 Вызов инструмента:</strong> ${escapeHtml(toolName)}<br>
                            <small>Аргументы: ${escapeHtml(toolArgs)}</small>`;
        messagesDiv.appendChild(msgDiv);
      }
      else if (type === 'tool_result') {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message tool-result';
        const toolName = extra.tool_name ? ` (${extra.tool_name})` : '';
        msgDiv.innerHTML = `<strong>📤 Результат${toolName}:</strong><br>
                            <pre>${escapeHtml(content)}</pre>`;
        messagesDiv.appendChild(msgDiv);
      }
      else if (type === 'system' || type === 'chat_history') {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message system';
        msgDiv.innerHTML = `<strong>Система:</strong> ${escapeHtml(content)}`;
        messagesDiv.appendChild(msgDiv);
      }
      else if (type === 'done') {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message system';
        msgDiv.innerHTML = `<strong>✅ Генерация завершена</strong>`;
        messagesDiv.appendChild(msgDiv);

        // Очищаем состояние потоков для этого run_id
        if (runId) {
          activeAssistantMessages.delete(runId);
          activeReasoningMessages.delete(runId);
        } else {
          fallbackAssistantDiv = null;
          fallbackReasoningDiv = null;
        }
      }
      else if (type === 'history_cleared') {
        messagesDiv.innerHTML = '';
        addMessage('system', `✅ История чата очищена`);
        fallbackAssistantDiv = null;
        fallbackReasoningDiv = null;
        activeAssistantMessages.clear();
        activeReasoningMessages.clear();
      }
      else if (type === 'error') {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message system';
        msgDiv.innerHTML = `<strong>❌ Ошибка:</strong> ${escapeHtml(content)}`;
        messagesDiv.appendChild(msgDiv);
      }
      else {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message assistant';
        msgDiv.innerHTML = `<strong>${escapeHtml(type)}:</strong> ${escapeHtml(content)}`;
        messagesDiv.appendChild(msgDiv);
      }

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function connect() {
      userId = parseInt(document.getElementById('userId').value) || 1;
      if (ws && ws.readyState === WebSocket.OPEN) {
        alert("Уже подключено!");
        return;
      }

      const wsUrl = `ws://localhost:8083/ws/chat/${userId}?X-User-ID=${userId}`;
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        console.log(`✅ WebSocket подключён для пользователя ${userId}`);
        addMessage('system', `Подключено к чату (user_id = ${userId})`);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        console.log("← Получено:", data);

        const extra = {
          run_id: data.run_id,
          tool_name: data.tool_name,
          tool_args: data.tool_args
        };

        if (data.type === "chat_history") {
          addMessage('system', `Загружена история (${data.messages.length} сообщений)`);
          data.messages.forEach(msg => {
            addMessage(msg.role, msg.content);
          });
        }
        else if (data.type === "content" || data.type === "token") {
          addMessage('content', data.content, extra);
        }
        else if (data.type === "reasoning") {
          addMessage('reasoning', data.content, extra);
        }
        else if (data.type === "tool_call_start") {
          addMessage('tool_call_start', data.tool_name || "Инструмент", extra);
        }
        else if (data.type === "tool_result") {
          addMessage('tool_result', data.content, extra);
        }
        else if (data.type === "done") {
          addMessage('done', "Генерация завершена", extra);
        }
        else if (data.type === "history_cleared") {
          addMessage('history_cleared', '');
        }
        else if (data.type === "error") {
          addMessage('error', data.detail || data.content || 'Неизвестная ошибка');
        }
      };

      ws.onclose = () => {
        console.log("❌ WebSocket отключён");
        addMessage('system', "Соединение закрыто");
        fallbackAssistantDiv = null;
        fallbackReasoningDiv = null;
        activeAssistantMessages.clear();
        activeReasoningMessages.clear();
      };

      ws.onerror = (error) => {
        console.error("WebSocket ошибка:", error);
        addMessage('system', "Ошибка соединения с сервером");
      };
    }

    function sendMessage() {
      const input = document.getElementById('inputMessage');
      const content = input.value.trim();
      if (!content) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("Сначала подключитесь!");
        return;
      }

      const messageObj = {
        type: "user_message",
        content: content
      };
      ws.send(JSON.stringify(messageObj));
      addMessage('user', content);
      input.value = '';
    }

    function clearHistory() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("Сначала подключитесь!");
        return;
      }
      if (!confirm("Очистить всю историю чата?")) return;
      ws.send(JSON.stringify({ type: "clear_history" }));
      fallbackAssistantDiv = null;
      fallbackReasoningDiv = null;
      activeAssistantMessages.clear();
      activeReasoningMessages.clear();
    }

    function disconnect() {
      if (ws) {
        ws.close();
        ws = null;
      }
    }

    document.getElementById('inputMessage').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
